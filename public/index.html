<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Old Games Saving</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <button class="brand" id="homeButton" type="button" aria-label="Old Games Saving">
        <span class="brand-mark">OG</span>
        <span>Old Games Saving</span>
      </button>
      <label class="search">
        <span>Hledat</span>
        <input id="searchInput" type="search" placeholder="Název, platforma, rok">
      </label>
      <button class="admin-open" id="adminButton" type="button">Admin</button>
    </header>

    <main>
      <section class="library" id="listView">
        <div class="library-head">
          <div>
            <p class="eyebrow">Archiv souborů</p>
            <h1>Old Games Saving</h1>
          </div>
          <p class="counter" id="counter">0 položek</p>
        </div>
        <div class="game-grid" id="gameGrid"></div>
      </section>

      <section class="detail" id="detailView" hidden>
        <button class="back-button" id="backButton" type="button">Zpět do archivu</button>
        <div id="detailContent"></div>
      </section>
    </main>

    <aside class="admin-panel" id="adminPanel" aria-live="polite" hidden>
      <div class="panel-shell">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Soukromá správa</p>
            <h2>Administrace</h2>
          </div>
          <button class="icon-button" id="closeAdminButton" type="button" aria-label="Zavřít">×</button>
        </div>

        <form class="login-form" id="loginForm">
          <label>
            Administrátorský kód
            <input id="adminCode" name="code" type="password" inputmode="numeric" autocomplete="current-password" required>
          </label>
          <button type="submit">Odemknout</button>
        </form>

        <div class="admin-tools" id="adminTools" hidden>
          <form class="game-form" id="gameForm">
            <input type="hidden" id="editId" name="editId">
            <label>
              Název hry nebo balíku
              <input name="title" id="titleInput" maxlength="120" required>
            </label>
            <div class="form-row">
              <label>
                Platforma
                <input name="platform" id="platformInput" maxlength="80" placeholder="DOS, Windows 98, PS1">
              </label>
              <label>
                Rok
                <input name="year" id="yearInput" maxlength="20" placeholder="1998">
              </label>
            </div>
            <label>
              Krátký popis na kartě
              <textarea name="summary" id="summaryInput" maxlength="260" rows="3"></textarea>
            </label>
            <label>
              Popis po rozkliknutí
              <textarea name="description" id="descriptionInput" maxlength="8000" rows="7" required></textarea>
            </label>
            <label>
              Fotka před rozkliknutím
              <input name="thumbnail" type="file" accept="image/*">
            </label>
            <label>
              Další fotky po rozkliknutí
              <input name="gallery" type="file" accept="image/*" multiple>
            </label>
            <label>
              Soubory ke stažení
              <input name="files" type="file" multiple>
            </label>
            <div class="form-actions">
              <button type="submit" id="saveButton">Přidat položku</button>
              <button class="secondary" type="button" id="resetFormButton">Vyčistit</button>
            </div>
          </form>

          <div class="admin-list">
            <div class="admin-list-head">
              <h3>Nahrané položky</h3>
              <button class="secondary" id="logoutButton" type="button">Odhlásit</button>
            </div>
            <div id="adminItems"></div>
          </div>
        </div>
      </div>
    </aside>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="/app.js"></script>
  </body>
</html>
