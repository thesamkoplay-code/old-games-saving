<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Old Games Saving</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <button class="brand" id="homeButton" type="button" aria-label="Old Games Saving">
        <span class="brand-mark">OG</span>
        <span>Old Games Saving</span>
      </button>
      <label class="search">
        <span>Search</span>
        <input id="searchInput" type="search" placeholder="Title, platform, year">
      </label>
      <button class="admin-open" id="adminButton" type="button">Admin</button>
    </header>

    <main>
      <section class="library" id="listView">
        <div class="library-head">
          <div>
            <p class="eyebrow">File archive</p>
            <h1>Old Games Saving</h1>
          </div>
          <p class="counter" id="counter">0 items</p>
        </div>
        <div class="game-grid" id="gameGrid"></div>
      </section>

      <section class="detail" id="detailView" hidden>
        <button class="back-button" id="backButton" type="button">Back to archive</button>
        <div id="detailContent"></div>
      </section>
    </main>

    <aside class="admin-panel" id="adminPanel" aria-live="polite" hidden>
      <div class="panel-shell">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Private control</p>
            <h2>Administration</h2>
          </div>
          <button class="icon-button" id="closeAdminButton" type="button" aria-label="Close">×</button>
        </div>

        <form class="login-form" id="loginForm">
          <label>
            Admin code
            <input id="adminCode" name="code" type="password" inputmode="numeric" autocomplete="current-password" required>
          </label>
          <button type="submit">Unlock</button>
        </form>

        <div class="admin-tools" id="adminTools" hidden>
          <form class="game-form" id="gameForm">
            <input type="hidden" id="editId" name="editId">
            <label>
              Game or package title
              <input name="title" id="titleInput" maxlength="120" required>
            </label>
            <div class="form-row">
              <label>
                Platform
                <input name="platform" id="platformInput" maxlength="80" placeholder="DOS, Windows 98, PS1">
              </label>
              <label>
                Year
                <input name="year" id="yearInput" maxlength="20" placeholder="1998">
              </label>
            </div>
            <label>
              Short card description
              <textarea name="summary" id="summaryInput" maxlength="260" rows="3"></textarea>
            </label>
            <label>
              Download instructions
              <textarea name="description" id="descriptionInput" maxlength="8000" rows="7" required></textarea>
            </label>
            <label>
              Cover image file
              <input name="thumbnail" type="file" accept="image/*">
            </label>
            <label>
              Or cover image URL
              <input name="thumbnailUrl" id="thumbnailUrlInput" type="url" maxlength="1000" placeholder="https://...">
            </label>
            <label>
              Gallery image files
              <input name="gallery" type="file" accept="image/*" multiple>
            </label>
            <label>
              Or gallery image URLs
              <textarea name="galleryUrls" id="galleryUrlsInput" maxlength="6000" rows="3" placeholder="One URL per line"></textarea>
            </label>
            <label>
              Download files
              <input name="files" type="file" multiple>
            </label>
            <label>
              Or download links
              <textarea name="fileLinks" id="fileLinksInput" maxlength="8000" rows="4" placeholder="One link per line, for example: File name | https://..."></textarea>
            </label>
            <div class="form-actions">
              <button type="submit" id="saveButton">Add item</button>
              <button class="secondary" type="button" id="resetFormButton">Clear</button>
            </div>
          </form>

          <div class="admin-list">
            <div class="admin-list-head">
              <h3>Uploaded items</h3>
              <button class="secondary" id="logoutButton" type="button">Log out</button>
            </div>
            <div id="adminItems"></div>
          </div>
        </div>
      </div>
    </aside>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="/app.js"></script>
  </body>
</html>
